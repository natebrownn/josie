<!DOCTYPE html>
<html>

<head>

<title>LOVE OS Music</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container music-player">


<h1>💿 MUSIC SYSTEM</h1>


<p>
Now Playing...
</p>


<div class="cd-container">

<img src="blank-cd-or-dvd-disc-png.webp" class="spinning-cd">

</div>


<h2>
Futile Devices
</h2>


<p>
Sufjan Stevens
</p>



<div class="progress-bar">

<div class="progress"></div>

</div>



<audio id="song">

<source src="Futile%20Devices%20(Doveman%20Remix).mp3" type="audio/mpeg">

</audio>


<button onclick="playSong()">
▶ Play
</button>


<button onclick="pauseSong()">
⏸ Pause
</button>



<a href="desktop.html">

<button>
Return to Desktop
</button>

</a>


<p id="music-status">
System Ready
</p>


</div>



<script>

let song = document.getElementById("song");


function playSong(){

song.play();


document.getElementById("music-status").innerHTML =
"♪ Playing Futile Devices ♪";

}



function pauseSong(){

song.pause();


document.getElementById("music-status").innerHTML =
"Music paused";

}


</script>


</body>

</html>
